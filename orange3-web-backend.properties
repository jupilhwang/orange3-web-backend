# ============================================================================
# Orange3 Web Backend Configuration
# ============================================================================
# Priority: Config file > Environment variables > Default values
#
# Config file search paths:
#   1. ./orange3-web-backend.properties (current directory)
#   2. /etc/orange3-web/orange3-web-backend.properties
#   3. ~/.orange3-web/orange3-web-backend.properties
#
# Environment variables can also be used (see ENV column below)

# ============================================================================
# Database Configuration
# ============================================================================
# database.url - Database connection URL
#   ENV: DATABASE_URL
#   Default: sqlite+aiosqlite:///{app_root}/orange_web.db
#   
#   Supported databases and URL formats:
#   - SQLite:     sqlite+aiosqlite:///./orange_web.db
#   - PostgreSQL: postgresql+asyncpg://user:pass@host:5432/dbname
#   - MySQL:      mysql+aiomysql://user:pass@host:3306/dbname
#   - Oracle:     oracle+oracledb://user:pass@host:1521/service_name
#
#   With SSL (PostgreSQL):
#   postgresql+asyncpg://user:pass@host:5432/dbname?ssl=require
database.url=postgresql+asyncpg://avnadmin:AVNS_0ak2szFe2BRgrjQNCKb@pg-3d7c1f75-jupil-dac6.l.aivencloud.com:12439/defaultdb?ssl=require

# database.dir - Directory for SQLite database file (if database.url not set)
#   ENV: DATABASE_DIR
#   Default: {app_root}
#   Examples: /var/lib/orange3-web, ./data, /opt/orange3/db
# database.dir=/var/lib/orange3-web

# database.echo - Enable SQL query logging (for debugging)
#   ENV: DATABASE_ECHO
#   Values: true, false
#   Default: false
# database.echo=false

# Connection Pool Settings (for PostgreSQL/MySQL/Oracle)
# database.pool_size - Number of connections in the pool
#   Values: 1-50
#   Default: 5
database.pool_size=5

# database.max_overflow - Max connections above pool_size
#   Values: 0-50
#   Default: 10
database.max_overflow=10

# database.pool_timeout - Seconds to wait for a connection
#   Values: 1-300
#   Default: 30
database.pool_timeout=30

# database.pool_recycle - Seconds before connection is recycled
#   Values: 300-7200
#   Default: 1800 (30 minutes)
database.pool_recycle=1800

# ============================================================================
# Server Configuration
# ============================================================================
# server.host - Server bind address
#   ENV: HOST
#   Values: 0.0.0.0 (all interfaces), 127.0.0.1 (localhost only)
#   Default: 0.0.0.0
# server.host=0.0.0.0

# server.port - Server port
#   ENV: PORT
#   Values: 1-65535
#   Default: 8000
# server.port=8000

# server.workers - Number of worker processes (production)
#   ENV: WORKERS
#   Values: 1-16 (recommended: CPU cores * 2 + 1)
#   Default: 1
# server.workers=4

# server.reload - Enable auto-reload (development only)
#   ENV: RELOAD
#   Values: true, false
#   Default: false
# server.reload=false

# ============================================================================
# Path Configuration
# ============================================================================
# path.upload - Base directory for file uploads
#   ENV: UPLOAD_DIR
#   Default: {app_root}/uploads
#   Examples: /var/lib/orange3-web/uploads, ./uploads
# path.upload=/var/lib/orange3-web/uploads

# path.corpus - Directory for text corpus files
#   ENV: CORPUS_DIR
#   Default: {upload_dir}/corpus
#   Examples: /var/lib/orange3-web/corpus, ./corpus
# path.corpus=/var/lib/orange3-web/corpus

# path.datasets_cache - Directory for cached datasets
#   ENV: DATASETS_CACHE_DIR
#   Default: {app_root}/datasets_cache
#   Examples: /var/lib/orange3-web/datasets_cache, ./datasets_cache
# path.datasets_cache=/var/lib/orange3-web/datasets_cache

# path.database - Directory for database files (SQLite)
#   ENV: DATABASE_DIR
#   Default: {app_root}
# path.database=/var/lib/orange3-web

# ============================================================================
# Storage Configuration
# ============================================================================
# storage.type - File storage backend type
#   ENV: STORAGE_TYPE
#   Values: sqlite, postgresql, mysql, oracle, filesystem, local
#   Default: sqlite
#   
#   - sqlite/postgresql/mysql/oracle: Store files in database (BLOB)
#   - filesystem/local: Store files on local filesystem
storage.type=postgresql

# storage.max_db_file_size - Maximum file size for database storage (bytes)
#   ENV: MAX_DB_FILE_SIZE
#   Default: 52428800 (50MB)
#   Examples: 10485760 (10MB), 52428800 (50MB), 104857600 (100MB)
storage.max_db_file_size=52428800

# storage.compression_enabled - Enable zlib compression for DB storage
#   ENV: STORAGE_COMPRESSION_ENABLED
#   Values: true, false
#   Default: true
# storage.compression_enabled=true

# storage.compression_level - Compression level (1=fast, 9=best)
#   ENV: STORAGE_COMPRESSION_LEVEL
#   Values: 1-9
#   Default: 6
# storage.compression_level=6

# storage.compression_min_size - Minimum file size to compress (bytes)
#   ENV: STORAGE_COMPRESSION_MIN_SIZE
#   Default: 1024 (1KB)
# storage.compression_min_size=1024

# ============================================================================
# Logging Configuration
# ============================================================================
# log.level - Logging level
#   ENV: LOG_LEVEL
#   Values: DEBUG, INFO, WARNING, ERROR, CRITICAL
#   Default: INFO
log.level=INFO

# log.database_echo - Echo SQL queries to log (for debugging)
#   ENV: DATABASE_ECHO
#   Values: true, false
#   Default: false
# log.database_echo=false

# ============================================================================
# OpenTelemetry Configuration
# ============================================================================
# otel.enabled - Enable OpenTelemetry tracing
#   ENV: OTEL_ENABLED
#   Values: true, false
#   Default: true
otel.enabled=false

# otel.endpoint - OTLP exporter endpoint
#   ENV: OTEL_ENDPOINT
#   Default: none (disabled)
#   Examples: localhost:4318, http://jaeger:4318, http://otel-collector:4318
# otel.endpoint=localhost:4318

# ============================================================================
# Load Balancer Registration
# ============================================================================
# lb.enabled - Register with frontend load balancer
#   ENV: LB_ENABLED
#   Values: true, false
#   Default: true
# lb.enabled=true

# frontend.url - Frontend URL for LB registration
#   ENV: FRONTEND_URL
#   Default: http://localhost:3000
# frontend.url=http://localhost:3000

# backend.url - This backend's URL for LB registration
#   ENV: BACKEND_URL
#   Default: http://localhost:8000
# backend.url=http://localhost:8000
