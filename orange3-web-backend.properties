# ============================================================================
# Orange3 Web Backend Configuration - Instance 1 (Port 8000)
# ============================================================================
# For E2E Multi-Instance Testing

# Server
server.host=0.0.0.0
server.port=8000

# Storage
storage.type=sqlite
storage.max_db_file_size=52428800

# Database (SQLite for testing)
database.url=sqlite+aiosqlite:///./orange_web_8000.db

# Logging
log.level=INFO

# OpenTelemetry
otel.enabled=false
otel.endpoint=127.0.0.1:4317

# mDNS Service Discovery (IPv4 only)
# Note: Service port is automatically taken from server.port
mdns.enabled=true
mdns.service_type=_orange3-web._tcp
mdns.service_name=orange3-backend-1
mdns.multicast_address=224.0.0.251
mdns.udp_port=5353

# Force loopback interface for macOS compatibility, Remove for linux or other systems
mdns.interface=lo0 